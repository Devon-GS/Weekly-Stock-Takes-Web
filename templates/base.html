<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Weekly Stock Takes{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        header p {
            color: #666;
            font-size: 14px;
        }

        nav {
            background: white;
            padding: 15px 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        nav a {
            text-decoration: none;
            color: #667eea;
            font-weight: 500;
            transition: all 0.3s ease;
            padding: 8px 16px;
            border-radius: 5px;
        }

        nav a:hover {
            background: #f0f0f0;
            color: #764ba2;
        }

        nav a.active {
            background: #667eea;
            color: white;
        }

        .department-nav {
            background: white;
            padding: 12px 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            border-bottom: 3px solid #f0f0f0;
        }

        .department-nav button {
            background: none;
            border: none;
            color: #667eea;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .department-nav button:hover {
            background: #f0f0f0;
            color: #764ba2;
        }

        .department-nav button.active {
            background: #667eea;
            color: white;
        }

        .department-tabs {
            background: white;
            padding: 12px 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            border-bottom: 2px solid #e0e0e0;
        }

        .department-tabs a {
            text-decoration: none;
            color: #666;
            font-weight: 500;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 5px;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .department-tabs a:hover {
            background: #f0f0f0;
            color: #667eea;
        }

        .department-tabs a.active {
            background: #667eea;
            color: white;
        }

        .content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-danger {
            background: #ff6b6b;
        }

        .btn-danger:hover {
            box-shadow: 0 6px 12px rgba(255, 107, 107, 0.4);
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }

        th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #ddd;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #ddd;
            color: #555;
            font-size: 14px;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #667eea;
        }

        .stat-card h3 {
            color: #666;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: #333;
        }

        .error-message {
            color: #721c24;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .success-message {
            color: #155724;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        @media (max-width: 768px) {
            header {
                padding: 20px;
            }

            header h1 {
                font-size: 20px;
            }

            nav {
                flex-direction: column;
                gap: 10px;
            }

            nav a {
                padding: 10px;
                text-align: center;
            }

            .content {
                padding: 20px;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 10px;
            }

            .btn-small {
                padding: 4px 8px;
                font-size: 11px;
            }
        }

        footer {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px 30px;
            border-radius: 10px;
            margin-top: 30px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            color: #666;
            font-size: 14px;
        }

        footer p {
            margin: 0;
            line-height: 1.6;
        }

        footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: #764ba2;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        <header>
            <h1>Weekly Stock Takes</h1>
            <p>Coffee Shop Inventory Management System</p>
        </header>

        <nav>
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">Dashboard</a>
            <a href="/import" class="{% if request.path == '/import' %}active{% endif %}">Import CSV</a>
        </nav>

        <div class="department-nav">
            <button class="dept-btn active" data-department="coffee-milk">Coffee and Milk</button>
            <button class="dept-btn" data-department="bakery">Bakery</button>
        </div>

        <div class="department-tabs" id="departmentTabs">
            <!-- Tabs will be populated by JavaScript -->
        </div>

        <div class="content">
            {% block content %}{% endblock %}
        </div>

        <footer>
            <p>Coded by Devon - Redfire IT Solutions © <span id="year"></span></p>
        </footer>
    </div>

    <script>
        // Set dynamic year in footer
        document.getElementById('year').textContent = new Date().getFullYear();

        // Department and Tab Management
        const departmentTabs = {
            'coffee-milk': [
                { name: 'Milk Usage', path: '/milk' },
                { name: 'Bean Coffee', path: '/bean' },
                { name: 'Lavazza Coffee', path: '/lavazza' },
                { name: 'Sugar & Sweetener', path: '/sugar' },
                { name: 'Settings', path: '/settings' }
            ],
            'bakery': [
                { name: 'Dough', path: '/bakery/dough' },
                { name: 'Egg Wash', path: '/bakery/egg-wash' },
                { name: 'Mayo Usage', path: '/bakery/mayo' },
                { name: 'Sweet Chilli Usage', path: '/bakery/sweet-chilli' }
            ]
        };

        let currentDepartment = 'coffee-milk';
        let activeTabs = {
            'coffee-milk': '/milk',
            'bakery': '/bakery/dough'
        };

        function updateDepartmentTabs() {
            const tabsContainer = document.getElementById('departmentTabs');
            const tabs = departmentTabs[currentDepartment];
            
            tabsContainer.innerHTML = '';
            tabs.forEach(tab => {
                const a = document.createElement('a');
                a.href = tab.path;
                a.textContent = tab.name;
                if (tab.path === activeTabs[currentDepartment]) {
                    a.classList.add('active');
                }
                tabsContainer.appendChild(a);
            });
        }

        function switchDepartment(dept) {
            currentDepartment = dept;
            
            // Update active button
            document.querySelectorAll('.dept-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-department="${dept}"]`).classList.add('active');
            
            // Update tabs
            updateDepartmentTabs();
            
            // Navigate to the active tab for this department
            const activeTabPath = activeTabs[dept];
            if (activeTabPath) {
                window.location.href = activeTabPath;
            }
        }

        // Set up department button listeners
        document.querySelectorAll('.dept-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                switchDepartment(this.dataset.department);
            });
        });

        // Initialize tabs based on current path
        const currentPath = window.location.pathname;
        
        // Determine current department based on path
        if (currentPath.startsWith('/bakery')) {
            currentDepartment = 'bakery';
            activeTabs['bakery'] = currentPath;
        } else if (currentPath === '/milk' || currentPath === '/bean' || currentPath === '/lavazza' || currentPath === '/sugar') {
            currentDepartment = 'coffee-milk';
            activeTabs['coffee-milk'] = currentPath;
        }

        // Update initial state
        document.querySelector(`[data-department="${currentDepartment}"]`).classList.add('active');
        updateDepartmentTabs();

        function showAlert(message, type) {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            
            const content = document.querySelector('.content');
            content.insertBefore(alert, content.firstChild);
            
            setTimeout(() => alert.remove(), 4000);
        }

        function deleteRecord(url, recordId) {
            if (confirm('Are you sure you want to delete this entry?')) {
                fetch(url, { method: 'DELETE' })
                    .then(r => r.json())
                    .then(data => {
                        if (data.success) {
                            showAlert(data.message, 'success');
                            setTimeout(() => location.reload(), 1000);
                        } else {
                            showAlert(data.error, 'error');
                        }
                    });
            }
        }
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>

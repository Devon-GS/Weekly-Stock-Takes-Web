{% extends "base.html" %}

{% block title %}Egg Wash - Bakery Tracking{% endblock %}

{% block content %}
<h2 style="margin-bottom: 20px; color: #333; font-size: 24px;">Egg Wash Tracking</h2>

<div style="background: #f0f4ff; border-left: 4px solid #667eea; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
    <p style="color: #333; font-size: 14px;">
        <strong>Track egg wash:</strong> Record egg wash preparation, usage, and inventory data.
    </p>
</div>

<form id="eggWashForm">
    <div class="form-row">
        <div class="form-group">
            <label for="date">Date *</label>
            <input type="date" id="date" name="date" required>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="eggWashQuantity">Egg Wash Quantity (L)</label>
            <input type="number" id="eggWashQuantity" name="eggWashQuantity" step="0.01" min="0" value="0">
        </div>
        <div class="form-group">
            <label for="eggWashUsed">Egg Wash Used (L)</label>
            <input type="number" id="eggWashUsed" name="eggWashUsed" step="0.01" min="0" value="0">
        </div>
    </div>

    <button type="submit" class="btn">Save Entry</button>
</form>

<h3 style="margin-top: 40px; margin-bottom: 20px; color: #333; font-size: 18px;">Egg Wash History</h3>

<div style="color: #999; text-align: center; padding: 40px; font-size: 14px;">
    No entries yet
</div>

{% endblock %}

{% block extra_js %}
<script>
    document.getElementById('date').valueAsDate = new Date();
    
    document.getElementById('eggWashForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const formData = {
            date: document.getElementById('date').value,
            eggWashQuantity: document.getElementById('eggWashQuantity').value,
            eggWashUsed: document.getElementById('eggWashUsed').value
        };

        try {
            const response = await fetch('/api/bakery/egg-wash', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            const data = await response.json();

            if (data.success) {
                showAlert(data.message, 'success');
                document.getElementById('eggWashForm').reset();
                setTimeout(() => location.reload(), 1500);
            } else {
                showAlert(data.error, 'error');
            }
        } catch (error) {
            showAlert('An error occurred: ' + error.message, 'error');
        }
    });
</script>
{% endblock %}
